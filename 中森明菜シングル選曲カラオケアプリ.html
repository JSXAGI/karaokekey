        /* ==========================================================================

        :root {
            --bg-body: #050b0c;         /* 砂漠の冷たい夜空（極めて深い青緑） */
            --bg-app: #091314;          /* オアシスの静寂（ディープ・モスグリーン） */
            --bg-card: #112224;         /* アラビアの絨毯（神秘的なインディゴグリーン） */
            --border-color: rgba(230, 184, 0, 0.15); /* 砂金の輝きを秘めた細線 */
            --text-main: #f9f6ef;       /* シルクの白（やや生成りがかった高級感ある白） */
            --text-sub: #b3a280;        /* 乾いた砂漠のアンティークゴールド */
            --accent-pink: #ff6600;     /* 『SAND BEIGE』沈む夕陽のサンセットオレンジ */
            --accent-gold: #e6b800;     /* 『AL-MAUJ』千夜一夜の秘宝ゴールド */
            --font-app: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            --radius-main: 12px;
        }
        /* ========================================================================== */

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-app);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            letter-spacing: 0.04em;
        }

        .app-container {
            width: 100%;
            max-width: 460px;
            background-color: var(--bg-app);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9), 0 0 30px rgba(230, 184, 0, 0.05);
        }

        @media (min-width: 640px) {
            .app-container { min-height: 92vh; margin: 20px 0; border-radius: var(--radius-main); overflow: hidden; border: 1px solid rgba(230, 184, 0, 0.08); }
        }

        header {
            padding: 20px 20px 15px;
            background: linear-gradient(to bottom, #162c2f, var(--bg-app));
            display: flex; justify-content: space-between; align-items: flex-end;
        }
        .brand-title {
            font-size: 11px; font-weight: 900; letter-spacing: 4px; color: var(--accent-gold); text-transform: uppercase;
        }
        h1 { font-size: 18px; font-weight: 700; color: var(--text-main); margin-top: 2px; }

        .search-area { padding: 0 20px 15px; background-color: var(--bg-app); position: sticky; top: 0; z-index: 100; }
        .search-wrapper { position: relative; }
        #search-input {
            width: 100%; padding: 12px 16px; padding-right: 70px; font-size: 13px;
            background-color: #0c1a1c; border: 1px solid var(--border-color);
            border-radius: 30px; color: var(--text-main); outline: none; transition: all 0.3s;
        }
        #search-input:focus { border-color: var(--accent-gold); box-shadow: 0 0 12px rgba(230, 184, 0, 0.2); }
        .match-count { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: bold; color: var(--text-sub); }

        .info-bar {
            display: flex; justify-content: space-between; padding: 10px 20px; font-size: 11px; color: var(--text-sub); background: rgba(0,0,0,0.3);
            align-items: center; border-bottom: 1px solid rgba(255,255,255,0.01);
        }
        .fav-filter-btn {
            background: rgba(179, 162, 128, 0.1); border: 1px solid rgba(179, 162, 128, 0.2);
            color: var(--text-main); padding: 4px 10px; border-radius: 20px; cursor: pointer;
            font-weight: bold; transition: all 0.2s; display: flex; align-items: center; gap: 4px;
        }
        .fav-filter-btn:hover { background: rgba(179, 162, 128, 0.2); }
        /* モードON時は黄金とオレンジの妖艶な光を放つ */
        .fav-filter-btn.active-mode {
            background-color: rgba(230, 184, 0, 0.15); border-color: var(--accent-gold);
            color: #ffe680; box-shadow: 0 0 10px rgba(230, 184, 0, 0.25);
        }

        main { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
        
        .jacket-card {
            background: linear-gradient(135deg, var(--bg-card) 0%, #0a1416 100%);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-main);
            padding: 16px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s, border-color 0.2s;
            overflow: hidden;
        }
        /* カード左端の飾り線もゴールドへ */
        .jacket-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent-gold); opacity: 0.7;
        }
        /* 特別アレンジ曲（エスニック曲等）は鮮烈なサンセットオレンジで強調 */
        .jacket-card.alt-color::before { background: var(--accent-pink); }

        .card-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .no-badge { font-family: "Impact", "Arial Black", sans-serif; font-size: 16px; font-style: italic; color: rgba(230, 184, 0, 0.1); letter-spacing: 1px; }
        .release-date { font-family: monospace; font-size: 11px; color: var(--text-sub); opacity: 0.8; }

        .tracks-container { display: flex; flex-direction: column; gap: 12px; }
        
        .main-track { display: flex; justify-content: space-between; align-items: flex-start; }
        .main-title { font-size: 16px; font-weight: bold; color: var(--text-main); text-shadow: 0 1px 3px rgba(0,0,0,0.6); line-height: 1.3; }
        
        .coupling-track {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding-top: 10px; border-top: 1px solid rgba(230, 184, 0, 0.08); margin-top: 2px;
        }
        .coupling-title { font-size: 13px; font-weight: 500; color: #e2e8f0; opacity: 0.85; display: flex; align-items: center; gap: 6px; }
        .coupling-title::before { content: "c/w"; font-size: 9px; font-family: monospace; color: var(--text-sub); background: rgba(255,255,255,0.03); padding: 1px 4px; border-radius: 2px; }

        .tags-wrapper { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
        .tag { font-size: 10px; background: rgba(230, 184, 0, 0.05); border: 1px solid rgba(230, 184, 0, 0.12); color: var(--text-sub); padding: 2px 6px; border-radius: 4px; }
        .main-track .tag { background: rgba(255, 102, 0, 0.04); border-color: rgba(255, 102, 0, 0.15); color: #ffaa66; }

        .fav-btn { background: none; border: none; cursor: pointer; padding: 4px; color: rgba(255, 255, 255, 0.1); transition: all 0.2s; shrink: 0; margin-left: 8px; }
        .fav-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; }
        /* 薔薇がお気に入りに染まった時はオアシスのゴールドに輝く */
        .fav-btn.active { color: var(--accent-gold); filter: drop-shadow(0 0 6px var(--accent-gold)); }
        .fav-btn.active svg { fill: var(--accent-gold); }

        .custom-add-box { margin: 20px 16px 40px; padding: 16px; background-color: var(--bg-card); border: 1px dashed var(--border-color); border-radius: var(--radius-main); }
        .custom-toggle-btn { width: 100%; background: none; border: none; font-size: 12px; font-weight: bold; color: var(--text-sub); cursor: pointer; }
        .form-group { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
        .form-input { width: 100%; padding: 10px; font-size: 12px; background-color: #0a1416; border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-main); outline: none; }
        .submit-btn { width: 100%; padding: 11px; font-size: 12px; font-weight: bold; background-color: var(--accent-gold); color: #070409; border: none; border-radius: 6px; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>

                searchWord = e.target.value.toLowerCase().trim();
                render();
            });
        }

        window.toggleFavMode = function() {
            isFavOnlyMode = !isFavOnlyMode;
            const btn = document.getElementById('fav-filter-toggle');
            if (isFavOnlyMode) {
                btn.classList.add('active-mode');
            } else {
                btn.classList.remove('active-mode');
            }
            render();
        };

        function render() {
            const allJackets = [...SINGLE_JACKETS, ...customs];
            
            const filtered = allJackets.filter(j => {
                const favId1 = `${j.no}-t1`;
                const favId2 = `${j.no}-t2`;
                
                if (isFavOnlyMode && !favorites.has(favId1) && !favorites.has(favId2)) {
                    return false;
                }

                if (!searchWord) return true;
                const matchT1 = j.t1.toLowerCase().includes(searchWord) || j.t1_keys.some(k => k.toLowerCase().includes(searchWord));
                const matchT2 = j.t2 ? (j.t2.toLowerCase().includes(searchWord) || j.t2_keys.some(k => k.toLowerCase().includes(searchWord))) : false;
                const matchMeta = j.no.toLowerCase().includes(searchWord) || j.date.includes(searchWord);
                return matchT1 || matchT2 || matchMeta;
            });

            document.getElementById('match-count').textContent = `${filtered.length}枚`;
            document.getElementById('fav-count-num').textContent = favorites.size;
            document.getElementById('total-info-text').textContent = isFavOnlyMode ? "✨ ベスト盤表示中" : `全${allJackets.length}盤を網羅`;

            let html = "";
            filtered.forEach((j) => {
                const favId1 = `${j.no}-t1`;
                const favId2 = `${j.no}-t2`;
                const isFav1 = favorites.has(favId1);
                const isFav2 = favorites.has(favId2);
                
                if (isFavOnlyMode && !isFav1 && !isFav2) return;

                const cardClass = j.x ? "jacket-card alt-color" : "jacket-card";

                let cardHtml = `
                    <div class="${cardClass}">
                        <div class="card-meta">
                            <span class="no-badge">${j.no}</span>
                            <span class="release-date">${j.date}</span>
                        </div>
                        <div class="tracks-container">
                `;

                let hasContent = false;

                if (!isFavOnlyMode || isFav1) {
                    hasContent = true;
                    cardHtml += `
                            <div class="main-track">
                                <div>
                                    <div class="main-title">${j.t1}</div>
                                    <div class="tags-wrapper">
                                        ${j.t1_keys.map(k => `<span class="tag">${k}</span>`).join('')}
                                    </div>
                                </div>
                                <button onclick="toggleFav('${favId1}')" class="fav-btn ${isFav1?'active':''}">
                                    <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                                </button>
                            </div>
                    `;
                }

                if (j.t2 && (!isFavOnlyMode || isFav2)) {
                    const borderStyle = (isFavOnlyMode && !isFav1) ? 'style="border-top:none; padding-top:0;"' : '';
                    hasContent = true;
                    cardHtml += `
                            <div class="coupling-track" ${borderStyle}>
                                <div>
                                    <div class="coupling-title">${j.t2}</div>
                                    <div class="tags-wrapper">
                                        ${j.t2_keys ? j.t2_keys.map(k => `<span class="tag">${k}</span>`).join('') : ''}
                                    </div>
                                </div>
                                <button onclick="toggleFav('${favId2}')" class="fav-btn ${isFav2?'active':''}">
                                    <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                                </button>
                            </div>
                    `;
                }

                cardHtml += `
                        </div>
                    </div>
                `;

                if (hasContent) { html += cardHtml; }
            });

            document.getElementById('library-main').innerHTML = html || `<div style="text-align:center; font-size:12px; padding:40px; color:var(--text-sub);">${isFavOnlyMode ? '🌹 お気に入りに登録された曲がありません' : '該当するレコードがありません'}</div>`;
        }

        window.toggleFav = function(id) {
            if (favorites.has(id)) { favorites.delete(id); } else { favorites.add(id); }
            localStorage.setItem('f_akina_v2_favs', JSON.stringify([...favorites]));
            render();
        };

        window.addCustomJacket = function() {
            const no = document.getElementById('c-no').value.trim();
            const date = document.getElementById('c-date').value.trim();
            const t1 = document.getElementById('c-t1').value.trim();
            const t1_keys = document.getElementById('c-t1-keys').value.split('+').map(k=>k.trim()).filter(Boolean);
            const c_t2 = document.getElementById('c-t2').value.trim();
            const t2_keys = document.getElementById('c-t2-keys').value.split('+').map(k=>k.trim()).filter(Boolean);

            if (!no || !t1) { alert("盤名とメイン曲名は必須です"); return; }

            customs.push({ no, date, t1, t1_keys, t2: c_t2||null, t2_keys: c_t2?t2_keys:[] });
            localStorage.setItem('f_akina_v2_cust', JSON.stringify(customs));
            
            document.getElementById('c-no').value = '';
            document.getElementById('c-date').value = '';
            document.getElementById('c-t1').value = '';
            document.getElementById('c-t1-keys').value = '';
            document.getElementById('c-t2').value = '';
            document.getElementById('c-t2-keys').value = '';
            render();
        };

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
